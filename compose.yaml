services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: riptide
      POSTGRES_PASSWORD: riptide
      POSTGRES_DB: riptide
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riptide -d riptide"]
      interval: 2s
      timeout: 2s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      RIPTIDE_DB_URL: postgresql+asyncpg://riptide:riptide@db:5432/riptide
      RIPTIDE_CATALOG_PATH: /etc/riptide-collector/service-catalog.json
      RIPTIDE_TEAM_KEYS_PATH: /etc/riptide-collector/team-keys.json
    volumes:
      - ./config/service-catalog.json:/etc/riptide-collector/service-catalog.json:ro
      - ./config/team-keys.dev.json:/etc/riptide-collector/team-keys.json:ro
    command: ["alembic", "upgrade", "head"]

  app:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      RIPTIDE_DB_URL: postgresql+asyncpg://riptide:riptide@db:5432/riptide
      RIPTIDE_CATALOG_PATH: /etc/riptide-collector/service-catalog.json
      RIPTIDE_TEAM_KEYS_PATH: /etc/riptide-collector/team-keys.json
      RIPTIDE_LOG_LEVEL: INFO
    volumes:
      - ./config/service-catalog.json:/etc/riptide-collector/service-catalog.json:ro
      - ./config/team-keys.dev.json:/etc/riptide-collector/team-keys.json:ro
    ports:
      - "8000:8000"
# Dev raw bearers (use as `Authorization: Bearer <raw>`):
#   checkout team → dev-checkout
#   platform team → dev-platform
# These are matched by their sha256 hashes in config/team-keys.dev.json.
