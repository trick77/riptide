apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  template.app-deployed-riptide: |
    webhook:
      riptide:
        method: POST
        body: |
          {
            "app_name": "{{.app.metadata.name}}",
            "revision": "{{.app.status.sync.revision}}",
            "sync_status": "{{.app.status.sync.status}}",
            "operation_phase": "{{.app.status.operationState.phase}}",
            "started_at": "{{.app.status.operationState.startedAt}}",
            "finished_at": "{{.app.status.operationState.finishedAt}}"
          }

  trigger.on-deployed: |
    - description: Application deployed
      send: [app-deployed-riptide]
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'

  trigger.on-sync-succeeded: |
    - description: Sync succeeded
      send: [app-deployed-riptide]
      when: app.status.operationState.phase in ['Succeeded']

  trigger.on-sync-failed: |
    - description: Sync failed
      send: [app-deployed-riptide]
      when: app.status.operationState.phase in ['Error', 'Failed']
