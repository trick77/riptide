apiVersion: apps/v1
kind: Deployment
metadata:
  name: riptide-collector
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: riptide-collector
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: riptide-collector
        app.kubernetes.io/component: collector
    spec:
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: alembic
          image: riptide-collector:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: riptide-collector-app
            - secretRef:
                name: riptide-collector-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: app
          image: riptide-collector:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: riptide-collector-app
            - secretRef:
                name: riptide-collector-secrets
          volumeMounts:
            - name: catalog
              mountPath: /etc/riptide-collector
              readOnly: true
            - name: team-keys
              mountPath: /etc/riptide-collector-team-keys
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 60
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: catalog
          configMap:
            name: riptide-collector-service-catalog
        - name: team-keys
          secret:
            secretName: riptide-collector-team-keys
        - name: tmp
          emptyDir: {}
