apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml
  - configmap-app.yaml
  - job-migrate.yaml

configMapGenerator:
  - name: riptide-collector-service-catalog
    files:
      - service-catalog.json

labels:
  - pairs:
      app.kubernetes.io/name: riptide-collector
      app.kubernetes.io/part-of: riptide
      app.kubernetes.io/component: collector
