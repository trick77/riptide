apiVersion: batch/v1
kind: Job
metadata:
  name: riptide-collector-migrate
  annotations:
    # Pre-deploy hook so migrations run before the Deployment rolls.
    # Argo CD users: argocd.argoproj.io/hook: PreSync; argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: riptide-collector
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
      containers:
        - name: alembic
          image: riptide-collector:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: riptide-collector-app
            - secretRef:
                name: riptide-collector-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
