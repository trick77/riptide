name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --frozen
      - name: ruff lint
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: riptide
          POSTGRES_PASSWORD: riptide
          POSTGRES_DB: riptide
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riptide"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      # Bypass testcontainers and run tests against the service Postgres above.
      RIPTIDE_TEST_DB_URL: postgresql+asyncpg://riptide:riptide@localhost:5432/riptide
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --frozen
      - name: pytest --cov
        run: uv run pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

