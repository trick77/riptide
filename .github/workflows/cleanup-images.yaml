name: Cleanup images

on:
  schedule:
    # Weekly, Sundays at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Preview deletions without removing anything"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: cleanup-images
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # Keeps the 5 most recent tagged versions per image and removes the rest,
      # including orphaned untagged versions. v3.1.0+ automatically protects
      # multi-arch / attestation child manifests of the kept images, so the
      # provenance manifests produced by the release build are never broken.
      - uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "riptide-collector"
          tag-selection: both
          keep-n-most-recent: 5
          # Protect anything pushed in the last hour so a fresh release is never
          # caught by a concurrently scheduled cleanup.
          cut-off: 1h
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}
